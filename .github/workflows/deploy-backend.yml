name: Deploy Backend to Azure

on:
  push:
    branches:
      # - develop
      - test-api
      # - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build
      run: dotnet build Backend/GuitarAppBackend.csproj --configuration Release

    - name: Publish
      run: dotnet publish Backend/GuitarAppBackend.csproj -c Release -o published

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: "GuitarApp"
        package: ./published