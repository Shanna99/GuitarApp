name: Deploy Backend to Azure

on:
  push:
    branches:
      # - develop
      - test-api
      # - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

     # --- NEW: Auto-format C# code ---
    - name: Install dotnet-format
      run: dotnet tool install -g dotnet-format

    - name: Auto-format code
      run: dotnet format

    # Optional: commit & push formatted changes back
    - name: Commit and push formatted code
      run:
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto-format code" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }}

    - name: Build
      run: dotnet build Backend/GuitarAppBackend.csproj --configuration Release

    - name: Publish
      run: dotnet publish Backend/GuitarAppBackend.csproj -c Release -o published

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: "GuitarApp"
        package: ./published